name: Deploy Site to Plesk

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

concurrency:
  group: deploy-site
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      IS_TAKIP_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      IS_TAKIP_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      TEKLIF_SUPABASE_URL: ${{ secrets.TEKLIF_SUPABASE_URL }}
      TEKLIF_SUPABASE_ANON_KEY: ${{ secrets.TEKLIF_SUPABASE_ANON_KEY }}
      PUBLIC_QUOTE_BASE_URL: ${{ vars.PUBLIC_QUOTE_BASE_URL || 'https://uzalteknikservis.com/t' }}
    steps:
      - name: Validate secrets
        shell: bash
        run: |
          missing=()
          [[ -z "$IS_TAKIP_SUPABASE_URL" ]] && missing+=("SUPABASE_URL")
          [[ -z "$IS_TAKIP_SUPABASE_ANON_KEY" ]] && missing+=("SUPABASE_ANON_KEY")
          [[ -z "$TEKLIF_SUPABASE_URL" ]] && missing+=("TEKLIF_SUPABASE_URL")
          [[ -z "$TEKLIF_SUPABASE_ANON_KEY" ]] && missing+=("TEKLIF_SUPABASE_ANON_KEY")
          [[ -z "${{ secrets.PLESK_HOST }}" ]] && missing+=("PLESK_HOST")
          [[ -z "${{ secrets.PLESK_USER }}" ]] && missing+=("PLESK_USER")
          [[ -z "${{ secrets.PLESK_PASSWORD }}" ]] && missing+=("PLESK_PASSWORD")
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing GitHub secrets:\n- %s\n' "${missing[@]}"
            exit 1
          fi
          python - <<'PY'
          import os
          from urllib.parse import urlparse

          for label, key in (
              ("Is Takip", "IS_TAKIP_SUPABASE_URL"),
              ("Teklif", "TEKLIF_SUPABASE_URL"),
          ):
              host = urlparse(os.environ.get(key, "")).netloc or "INVALID_URL"
              print(f"{label} Supabase host: {host}")
          PY

      - name: Checkout Is Takip and portal
        uses: actions/checkout@v4
        with:
          repository: alihanylmz/hcs
          ref: main
          path: hcs
          token: ${{ secrets.DEPLOY_REPO_TOKEN || github.token }}

      - name: Checkout Teklif
        uses: actions/checkout@v4
        with:
          repository: alihanylmz/uzalteklif
          ref: 882f9fb
          path: uzalteklif
          token: ${{ secrets.DEPLOY_REPO_TOKEN || github.token }}

      - name: Setup Flutter stable for Is Takip
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build Is Takip web
        working-directory: hcs
        run: |
          flutter pub get
          flutter build web --release --base-href /is-takip/ \
            --dart-define=SUPABASE_URL="$IS_TAKIP_SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$IS_TAKIP_SUPABASE_ANON_KEY"

      - name: Setup Flutter beta for Teklif
        uses: subosito/flutter-action@v2
        with:
          channel: beta
          cache: true

      - name: Build Teklif web
        working-directory: uzalteklif
        run: |
          flutter pub get
          flutter build web --release --base-href /teklif/ \
            --dart-define=SUPABASE_URL="$TEKLIF_SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$TEKLIF_SUPABASE_ANON_KEY" \
            --dart-define=PUBLIC_QUOTE_BASE_URL="$PUBLIC_QUOTE_BASE_URL"

      - name: Prepare Plesk payload
        shell: bash
        run: |
          rm -rf site
          rm -rf repair
          mkdir -p site/is-takip site/teklif repair/is-takip
          cp -a hcs/portal/. site/
          cp -a hcs/build/web/. site/is-takip/
          cp -a uzalteklif/build/web/. site/teklif/
          gzip -9 -c hcs/build/web/main.dart.js > repair/is-takip/main.dart.js.gz

          cat > site/is-takip/.htaccess <<'EOF'
          <IfModule mod_mime.c>
            AddEncoding gzip .gz
            AddType application/javascript .js.gz
          </IfModule>

          <IfModule mod_headers.c>
            <FilesMatch "^(index\.html|flutter_bootstrap\.js|main\.dart\.js|flutter_service_worker\.js|version\.json)$">
              Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
              Header set Pragma "no-cache"
              Header set Expires "0"
            </FilesMatch>
            <FilesMatch "^main\.dart\.js\.gz$">
              Header set Content-Encoding gzip
              Header set Content-Type "application/javascript; charset=UTF-8"
              Header set Vary "Accept-Encoding"
              Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
              Header set Pragma "no-cache"
              Header set Expires "0"
            </FilesMatch>
          </IfModule>

          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /is-takip/
            RewriteCond %{HTTP:Accept-Encoding} gzip
            RewriteCond %{REQUEST_FILENAME}.gz -f
            RewriteRule ^main\.dart\.js$ main.dart.js.gz [L]
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /is-takip/index.html [L]
          </IfModule>
          EOF
          cp site/is-takip/.htaccess repair/is-takip/.htaccess

          cat > site/teklif/.htaccess <<'EOF'
          <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /teklif/
            RewriteRule ^index\.html$ - [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteRule . /teklif/index.html [L]
          </IfModule>
          <IfModule mod_headers.c>
            Header set X-Uzal-Teklif-Deploy "quote-edit-normalize-20260710"
            <FilesMatch "^(index\.html|flutter_bootstrap\.js|flutter_service_worker\.js)$">
              Header set Cache-Control "no-store, no-cache, must-revalidate, max-age=0"
            </FilesMatch>
            <FilesMatch "\.(js|json|wasm)$">
              Header set Cache-Control "no-cache, must-revalidate"
            </FilesMatch>
          </IfModule>
          EOF

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: plesk-site
          path: site

      - name: Repair Is Takip main bundle over FTP
        shell: bash
        env:
          PLESK_HOST: ${{ secrets.PLESK_HOST }}
          PLESK_USER: ${{ secrets.PLESK_USER }}
          PLESK_PASSWORD: ${{ secrets.PLESK_PASSWORD }}
          PLESK_PORT: ${{ secrets.PLESK_PORT || 21 }}
          PLESK_TARGET_DIR: ${{ secrets.PLESK_FTP_TARGET_DIR || '/httpdocs/' }}
        run: |
          target_dir="${PLESK_TARGET_DIR%/}/is-takip"
          upload_file() {
            local local_file="$1"
            local remote_name="$2"
            local target_url="ftp://$PLESK_HOST:$PLESK_PORT$target_dir/$remote_name"
            for attempt in {1..5}; do
              echo "Repair upload $remote_name attempt $attempt"
              if curl --fail --show-error --connect-timeout 30 \
              --ftp-method nocwd \
              --user "$PLESK_USER:$PLESK_PASSWORD" \
              --upload-file "$local_file" \
              "$target_url"; then
                return 0
              fi
              sleep 5
            done
            return 1
          }
          upload_file repair/is-takip/.htaccess .htaccess
          upload_file repair/is-takip/main.dart.js.gz main.dart.js.gz

      - name: Deploy to Plesk over FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.PLESK_HOST }}
          username: ${{ secrets.PLESK_USER }}
          password: ${{ secrets.PLESK_PASSWORD }}
          port: ${{ secrets.PLESK_PORT || 21 }}
          local-dir: site/
          server-dir: ${{ secrets.PLESK_FTP_TARGET_DIR || '/httpdocs/' }}
          dangerous-clean-slate: false
