name: Deploy Supabase Functions

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths:
      - "supabase/functions/approve-user/**"
      - "supabase/functions/send-notification/**"
      - ".github/workflows/deploy_supabase.yml"

jobs:
  deploy-functions:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
    strategy:
      fail-fast: false
      matrix:
        function_name:
          - approve-user
          - send-notification
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Supabase secrets
        shell: bash
        run: |
          missing=()
          [[ -z "$SUPABASE_ACCESS_TOKEN" ]] && missing+=("SUPABASE_ACCESS_TOKEN")
          [[ -z "$SUPABASE_PROJECT_REF" ]] && missing+=("SUPABASE_PROJECT_REF")
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing GitHub secrets:\n- %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy ${{ matrix.function_name }}
        run: supabase functions deploy "${{ matrix.function_name }}" --project-ref "$SUPABASE_PROJECT_REF" --use-api
