name: Release Builds

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version_name: ${{ steps.meta.outputs.version_name }}
      build_number: ${{ steps.meta.outputs.build_number }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: meta
        shell: bash
        run: |
          version_line="$(grep '^version:' pubspec.yaml | head -n 1 | awk '{print $2}')"
          version_name="${version_line%%+*}"
          build_number="${version_line##*+}"
          tag_name="${GITHUB_REF_NAME}"

          if [[ "${tag_name}" != "v${version_name}" ]]; then
            echo "Tag ${tag_name} does not match pubspec version v${version_name}."
            exit 1
          fi

          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"
          echo "tag_name=${tag_name}" >> "$GITHUB_OUTPUT"

  android-apk:
    needs: prepare
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
      ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
      ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate Android secrets
        shell: bash
        run: |
          missing=()
          [[ -z "$SUPABASE_URL" ]] && missing+=("SUPABASE_URL")
          [[ -z "$SUPABASE_ANON_KEY" && -z "$SUPABASE_KEY" ]] && missing+=("SUPABASE_ANON_KEY or SUPABASE_KEY")
          [[ -z "$ANDROID_KEYSTORE_BASE64" ]] && missing+=("ANDROID_KEYSTORE_BASE64")
          [[ -z "$ANDROID_STORE_PASSWORD" ]] && missing+=("ANDROID_STORE_PASSWORD")
          [[ -z "$ANDROID_KEY_PASSWORD" ]] && missing+=("ANDROID_KEY_PASSWORD")
          [[ -z "$ANDROID_KEY_ALIAS" ]] && missing+=("ANDROID_KEY_ALIAS")
          if (( ${#missing[@]} > 0 )); then
            printf 'Missing GitHub secrets:\n- %s\n' "${missing[@]}"
            exit 1
          fi

      - name: Restore Android signing files
        shell: bash
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/upload-keystore.jks
          {
            echo "storePassword=$ANDROID_STORE_PASSWORD"
            echo "keyPassword=$ANDROID_KEY_PASSWORD"
            echo "keyAlias=$ANDROID_KEY_ALIAS"
            echo "storeFile=upload-keystore.jks"
          } > android/key.properties

      - name: Install dependencies
        run: flutter pub get

      - name: Build Android APK
        shell: bash
        run: |
          flutter build apk --release \
            --dart-define=SUPABASE_URL="$SUPABASE_URL" \
            --dart-define=SUPABASE_ANON_KEY="$SUPABASE_ANON_KEY" \
            --dart-define=SUPABASE_KEY="$SUPABASE_KEY" \
            --dart-define=ONESIGNAL_APP_ID="$ONESIGNAL_APP_ID"

      - name: Prepare Android artifact
        shell: bash
        run: |
          mkdir -p dist
          cp build/app/outputs/flutter-apk/app-release.apk "dist/istakip-android-v${{ needs.prepare.outputs.version_name }}+${{ needs.prepare.outputs.build_number }}.apk"

      - name: Upload Android artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-release
          path: dist/*.apk

  windows-release:
    needs: prepare
    runs-on: windows-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      ONESIGNAL_APP_ID: ${{ secrets.ONESIGNAL_APP_ID }}
      WINDOWS_PFX_BASE64: ${{ secrets.WINDOWS_PFX_BASE64 }}
      WINDOWS_PFX_PASSWORD: ${{ secrets.WINDOWS_PFX_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Validate Windows secrets
        shell: pwsh
        run: |
          $missing = @()
          if ([string]::IsNullOrWhiteSpace($env:SUPABASE_URL)) { $missing += 'SUPABASE_URL' }
          if ([string]::IsNullOrWhiteSpace($env:SUPABASE_ANON_KEY) -and [string]::IsNullOrWhiteSpace($env:SUPABASE_KEY)) {
            $missing += 'SUPABASE_ANON_KEY or SUPABASE_KEY'
          }
          if ($missing.Count -gt 0) {
            Write-Host "Missing GitHub secrets:"
            $missing | ForEach-Object { Write-Host "- $_" }
            exit 1
          }

      - name: Install dependencies
        run: flutter pub get

      - name: Install MSIX tooling
        shell: pwsh
        run: |
          dart pub global activate msix
          "$env:LOCALAPPDATA\Pub\Cache\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build Windows release
        shell: pwsh
        run: |
          flutter build windows --release `
            --dart-define=SUPABASE_URL=$env:SUPABASE_URL `
            --dart-define=SUPABASE_ANON_KEY=$env:SUPABASE_ANON_KEY `
            --dart-define=SUPABASE_KEY=$env:SUPABASE_KEY `
            --dart-define=ONESIGNAL_APP_ID=$env:ONESIGNAL_APP_ID

      - name: Prepare Windows certificates
        id: windows_cert
        shell: pwsh
        run: |
          $publisher = $null
          $pfxPath = Join-Path $env:RUNNER_TEMP 'windows-msix-signing.pfx'
          $cerPath = Join-Path $env:RUNNER_TEMP 'windows-msix-signing.cer'
          $pfxPassword = $null

          if (-not [string]::IsNullOrWhiteSpace($env:WINDOWS_PFX_BASE64) -and -not [string]::IsNullOrWhiteSpace($env:WINDOWS_PFX_PASSWORD)) {
            [IO.File]::WriteAllBytes($pfxPath, [Convert]::FromBase64String($env:WINDOWS_PFX_BASE64))
            $pfxPassword = $env:WINDOWS_PFX_PASSWORD
            $cert = Get-PfxCertificate -FilePath $pfxPath
            $publisher = $cert.Subject
            [IO.File]::WriteAllBytes(
              $cerPath,
              $cert.Export([System.Security.Cryptography.X509Certificates.X509ContentType]::Cert)
            )
          } else {
            $publisher = 'CN=IsTakip Dev, O=HCS, C=TR'
            $pfxPassword = [Guid]::NewGuid().ToString('N')
            $securePassword = ConvertTo-SecureString -String $pfxPassword -AsPlainText -Force
            $cert = New-SelfSignedCertificate `
              -Type CodeSigningCert `
              -Subject $publisher `
              -FriendlyName 'IsTakip Dev' `
              -CertStoreLocation 'Cert:\CurrentUser\My'
            Export-PfxCertificate `
              -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" `
              -FilePath $pfxPath `
              -Password $securePassword | Out-Null
            Export-Certificate `
              -Cert "Cert:\CurrentUser\My\$($cert.Thumbprint)" `
              -FilePath $cerPath | Out-Null
          }

          "publisher=$publisher" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "pfx_path=$pfxPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "pfx_password=$pfxPassword" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "cer_path=$cerPath" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Sign Windows executable
        shell: pwsh
        run: |
          $signtool = Get-Command signtool.exe -ErrorAction SilentlyContinue
          if (-not $signtool) {
            Write-Host "signtool.exe bulunamadi; EXE imzalama atlandi. MSIX paketi yine sertifika ile imzalanacak."
            exit 0
          }

          & $signtool.Source sign `
            /fd SHA256 `
            /tr http://timestamp.digicert.com `
            /td SHA256 `
            /f "${{ steps.windows_cert.outputs.pfx_path }}" `
            /p "${{ steps.windows_cert.outputs.pfx_password }}" `
            "build\windows\x64\runner\Release\istakip_app.exe"

      - name: Create MSIX package
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          $artifactName = "istakip-windows-v${{ needs.prepare.outputs.version_name }}+${{ needs.prepare.outputs.build_number }}"
          dart pub global run msix:create `
            --release `
            --build-windows false `
            --install-certificate false `
            --display-name "IsTakip" `
            --publisher-display-name "HCS" `
            --identity-name "com.hcs.istakip" `
            --version "${{ needs.prepare.outputs.version_name }}.${{ needs.prepare.outputs.build_number }}" `
            --logo-path "assets/icon/icon.png" `
            --capabilities "internetClient" `
            --os-min-version "10.0.17763.0" `
            --certificate-path "${{ steps.windows_cert.outputs.pfx_path }}" `
            --certificate-password "${{ steps.windows_cert.outputs.pfx_password }}" `
            --publisher "${{ steps.windows_cert.outputs.publisher }}" `
            --output-path dist `
            --output-name $artifactName

      - name: Create App Installer files
        shell: pwsh
        run: |
          $versionName = '${{ needs.prepare.outputs.version_name }}'
          $buildNumber = '${{ needs.prepare.outputs.build_number }}'
          $msixVersion = "$versionName.$buildNumber"
          $versionedName = "istakip-windows-v$versionName+$buildNumber"
          $stableMsixName = 'istakip-windows.msix'
          $stableAppInstallerName = 'istakip-windows.appinstaller'
          $stableCertName = 'istakip-windows.cer'
          $repoBaseUrl = 'https://github.com/${{ github.repository }}/releases/latest/download'
          $stableMsixUrl = "$repoBaseUrl/$stableMsixName"
          $stableAppInstallerUrl = "$repoBaseUrl/$stableAppInstallerName"
          $publisher = '${{ steps.windows_cert.outputs.publisher }}'

          Copy-Item "dist\$versionedName.msix" "dist\$stableMsixName" -Force
          Copy-Item "${{ steps.windows_cert.outputs.cer_path }}" "dist\$stableCertName" -Force
          Copy-Item "${{ steps.windows_cert.outputs.cer_path }}" "dist\$versionedName.cer" -Force

          $appInstaller = @"
          <?xml version="1.0" encoding="utf-8"?>
          <AppInstaller
            xmlns="http://schemas.microsoft.com/appx/appinstaller/2017/2"
            xmlns:s4="http://schemas.microsoft.com/appx/appinstaller/2021"
            Uri="$stableAppInstallerUrl"
            Version="$msixVersion">
            <MainPackage
              Name="com.hcs.istakip"
              Publisher="$publisher"
              Version="$msixVersion"
              ProcessorArchitecture="x64"
              Uri="$stableMsixUrl" />
            <UpdateSettings>
              <OnLaunch HoursBetweenUpdateChecks="0" ShowPrompt="true" UpdateBlocksActivation="false" />
              <s4:AutomaticBackgroundTask />
              <s4:ForceUpdateFromAnyVersion>true</s4:ForceUpdateFromAnyVersion>
            </UpdateSettings>
          </AppInstaller>
          "@

          $appInstaller = $appInstaller.TrimStart()
          Set-Content -Path "dist\$stableAppInstallerName" -Value $appInstaller -Encoding utf8BOM
          Set-Content -Path "dist\$versionedName.appinstaller" -Value $appInstaller -Encoding utf8BOM

      - name: Package Windows ZIP bundle
        shell: pwsh
        run: |
          $versionedName = "istakip-windows-v${{ needs.prepare.outputs.version_name }}+${{ needs.prepare.outputs.build_number }}"
          $stableZipName = 'istakip-windows.zip'
          $stagingPath = Join-Path $env:RUNNER_TEMP $versionedName
          if (Test-Path $stagingPath) {
            Remove-Item -LiteralPath $stagingPath -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $stagingPath | Out-Null
          Copy-Item "build\windows\x64\runner\Release\*" $stagingPath -Recurse -Force
          Compress-Archive -Path $stagingPath -DestinationPath "dist\$versionedName.zip" -Force
          Copy-Item "dist\$versionedName.zip" "dist\$stableZipName" -Force

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: |
            dist/*.zip
            dist/*.msix
            dist/*.appinstaller
            dist/*.cer

  publish-release:
    needs:
      - prepare
      - android-apk
      - windows-release
    runs-on: ubuntu-latest
    steps:
      - name: Download Android artifact
        uses: actions/download-artifact@v4
        with:
          name: android-release
          path: release-assets/android

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release-assets/windows

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.tag_name }}
          name: IsTakip ${{ needs.prepare.outputs.version_name }}
          files: |
            release-assets/android/*.apk
            release-assets/windows/*.zip
            release-assets/windows/*.msix
            release-assets/windows/*.appinstaller
            release-assets/windows/*.cer
          generate_release_notes: true
